name: Chkout
on: push
jobs:
  # Git의 Checkout이란
  # repository에서 특정 branch로 전환하는 작업
  # 이 작업을 위해서는 우선적으로 
  # 레파지토리에 올려둔 코드를 로컬로 내려받는 작업이 선행되야 함
  # GitHub Actions 입장에서는 
  # GitHub의 저장소 코드를 CI서버로 다운로드 하여 특정 브랜치로 전환하는 행위
  checkout:
    runs-on: ubuntu-latest
    steps:
      # 테스트1(jobs/checkout)
     
      #- run: ls -al
      # 소유자명/저장소명@버전
      # 버전은 v3.5.3 이더라도 major버전만 입력하면 자동으로 해당 최신버전 적용
      # checkout 작업 간단설명(v3 기준임)
      # git init 작업디렉토리를 워크플로우로 만듬
      # git config git을 설정함
      # git config, submodule 설정작업
      # git fetch 원격저장소에서 코드 내용받아옴
      # git check 이 저장소인 main으로 전환함
      # git log: git log를 통해서 해당 branch에 마지막 커밋의 해시값을 출력
      # - uses: actions/checkout@v6
      # checkout 작업후 변경내용 확인(파일, 파일내용)
      # - run: ls -al
      # - run: cat .github/workflows/checkout.yml
  
      # 테스트2(jobs/checkout/steps/uses/with/path)
  
      # path: 저장위치를 지정
      # fetch-depth : 과거 변경이력 불러오기
      #- run: ls -al
      #- uses: actions/checkout@v6
      #  with:
      #    path: our-source
      #    fetch-depth: 3
      #- run: git log --pretty=oneline
      #- run: ls -al our-source
      #- run: cat our-source/.github/workflows/checkout.yml
  
      # # 테스트3(jobs/checkout/steps/uses/with/fetch-dapth)
      # - run: ls -al
      # - uses: actions/checkout@v6
      #   with:
      #     fetch-depth: 3
      # - run: git log --pretty=oneline

      # # 테스트4(jobs/checkout/steps/uses/with/fetch-dapth)
      - uses: actions/checkout@v6
        with:
          repository: actions/checkout
          ref: v6
      - run: ls -al
